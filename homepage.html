<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HOME | SMPLY LVLY</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  background: linear-gradient(135deg, #0A2A88, #5DA9FF);
  opacity: 0;
  animation: fadeIn 0.8s ease-in forwards;
}

/* PAGE LOAD ANIMATION */
@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* HERO SECTION */
.hero {
  min-height: 100vh;
  background: linear-gradient(135deg, #0A2A88, #5DA9FF);
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 0 8%;
  position: relative;
  overflow: hidden;
  color: white;
}



.navbar {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  width: 90%;
  padding: 15px 5%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background-color: #0A2A88;
  color: white;
  z-index: 10;
  border-radius: 15px;
  box-shadow: 0 4px 8px rgba(0,0,0,0.3);
}

.logo {
  font-size: 26px;
  font-weight: 800;
  letter-spacing: 3px;

  /* Gradient using background + mask for better compatibility */
  background: linear-gradient(90deg, #5DA9FF, #FFFFFF);
  color: #5DA9FF; /* fallback color */
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;

  transition: letter-spacing 0.3s ease;
}

.logo:hover {
  letter-spacing: 5px;
}

.nav-left,
.nav-right {
  display: flex;
}

.nav-left a,
.nav-right a {
  background-color: #5DA9FF;
  text-decoration: none;
  color: white;
  margin: 0 8px;
  font-size: 14px;
  padding: 6px 12px;
  transition: 0.3s;
  border-radius: 5px;
  font-weight: 600;
}

.nav-left a:hover,
.nav-right a:hover {
  opacity: 0.7;
}

.nav-links a:hover {
  opacity: 0.7;
}

/* HERO CONTENT */
.hero-content {
  max-width: 600px;
  z-index: 2;
}

.tag {
  background: #0A2A88;
  color: white;
  padding: 5px 12px;
  font-size: 12px;
  border-radius: 20px;
  display: inline-block;
  margin-bottom: 20px;
}

.hero h1 {
  font-size: 48px;
  line-height: 1.2;
  margin-bottom: 20px;
}

.hero p {
  font-size: 14px;
  opacity: 0.9;
  margin-bottom: 30px;
}

/* BUTTONS */
.buttons {
  display: flex;
  gap: 15px;
}

.btn {
  padding: 12px 25px;
  border-radius: 5px;
  border: none;
  cursor: pointer;
  font-weight: 600;
  transition: 0.3s;
}

.btn-primary {
  background: #0A2A88;
  color: white;
}

.btn-primary:hover {
  background: #061b5c;
}

.btn-outline {
  background: white;
  color: #5DA9FF;
}

.btn-outline:hover {
  opacity: 0.85;
}

/* HERO IMAGE */
.hero img {
  position: absolute;
  right: 5%;
  bottom: 0;
  height: 90%;
  object-fit: contain;
}

/* =========================
   TABLET RESPONSIVE (768px)
========================= */

@media (max-width: 1024px){

  .hero{
    padding: 120px 6% 40px;
  }

  .hero h1{
    font-size: 38px;
  }

  .hero p{
    font-size: 13px;
  }

  .hero img{
    height: 70%;
    right: 2%;
  }

  .navbar{
    width: 94%;
    padding: 12px 4%;
  }

}

/* =========================
   PHONE RESPONSIVE (600px)
========================= */

@media (max-width: 600px){

  .hero{
    padding: 120px 6% 40px;
    text-align: center;
    align-items: center;
  }

  .hero-content{
    max-width: 100%;
  }

  .hero h1{
    font-size: 30px;
  }

  .hero p{
    font-size: 13px;
  }

  .buttons{
    justify-content: center;
    flex-wrap: wrap;
  }

  .btn{
    padding: 10px 18px;
    font-size: 13px;
  }

  .hero img{
    position: relative;
    height: 260px;
    margin-top: 40px;
    right: auto;
  }

  .navbar{
    flex-direction: column;
    gap: 10px;
    width: 94%;
  }

  .nav-links{
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
  }

  .nav-links a{
    margin: 5px;
    font-size: 12px;
  }

}
</style>
</head>
<body>

<section class="hero">

<div class="navbar">

  <div class="nav-left">
    <a href="About.html">About</a>
    <a href="skills.html">Skills and Achievements</a>
  </div>

  <div class="logo">SMPLY LVLY</div>

  <div class="nav-right">
    <a href="SocialMedia.html">Social Media & Contacts</a>
    <a href="index.html">Log Out</a>
  </div>
  </div>

  <div class="hero-content">
    <div class="tag">Hi There!</div>
    <h1>I'm Raine Allen Capile<br>From 11 - Computer Programming</h1>
    <p>
    I'm going to tell you the story of how i live, dedicated, and being me.
    </p>
    <p>This is the story that you would not gonna miss it.</p>

    <div class="buttons">
      <button class="btn btn-primary" onclick="BtnAbout()">About My Story</button>
    </div>
  </div>

  <img src="barong.png" alt="Profile Image">

</section>
<script>
  function BtnAbout(){
  window.location.href = "About.html";
  }
</script>
</body>
</html>
