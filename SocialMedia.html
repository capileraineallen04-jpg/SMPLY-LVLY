<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  height: 100vh;
  background: linear-gradient(135deg, #0A2A88, #5DA9FF);
  opacity: 0;
  animation: fadeIn 0.8s ease-in forwards;
}

@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.navbar {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  width: 90%;
  padding: 15px 5%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background-color: #0A2A88;
  color: white;
  z-index: 10;
  border-radius: 15px;
  box-shadow: 0 4px 8px rgba(0,0,0,0.3);
}

.logo {
  font-size: 26px;
  font-weight: 800;
  letter-spacing: 3px;

  /* Gradient using background + mask for better compatibility */
  background: linear-gradient(90deg, #5DA9FF, #FFFFFF);
  color: #5DA9FF; /* fallback color */
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;

  transition: letter-spacing 0.3s ease;
}

.logo:hover {
  letter-spacing: 5px;
}

.nav-left,
.nav-right {
  display: flex;
}

.nav-left a,
.nav-right a {
  background-color: #5DA9FF;
  text-decoration: none;
  color: white;
  margin: 0 8px;
  font-size: 14px;
  padding: 6px 12px;
  transition: 0.3s;
  border-radius: 5px;
  font-weight: 600;
}

.nav-left a:hover,
.nav-right a:hover {
  opacity: 0.7;
}

.nav-links1 a:hover {
  opacity: 0.7;
}

.nav-links1 a {
  background-color: #5DA9FF;
  text-decoration: none;
  color: #0A2A88;
  margin-left: 15px;
  font-size: 14px;
  padding: 6px 12px;
  transition: 0.3s;
  border-radius: 5px;
}

.nav-links1 a:hover {
  opacity: 0.7;
}

.about-wrapper {
  height: 90%;
  display: flex;
  align-items: center;
  justify-content: center;
  padding-top: 80px;
}

.about-card {
  width: 85%;
  height: 75vh;
  background: white;
  border-radius: 20px;
  box-shadow: 0 15px 40px rgba(0,0,0,0.15);
  display: flex;
  padding: 20px;
  gap: 20px;
}

.about-video {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
}

.about-video video {
  width: 65%;
  height: 100%;
  border-radius: 15px;
  object-fit: cover;
}

.about-text {
  flex: 1;
  margin-left: 20px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.about-text h2 {
  color: #0A2A88;
  margin-bottom: 20px;
  font-size: 48px;
}

.contact-item {
  font-size: 38px;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 15px;
}

.contact-item svg {
  width: 35px;
  height: 35px;
  flex-shrink: 0;
  display: block;
}

.contact-item a {
  color: #333;
  text-decoration: none;
  display: flex;
  align-items: center;
  gap: 12px;
  transition: 0.3s;
}

.contact-item a:hover {
  color: #5DA9FF;
}

.about-text::-webkit-scrollbar {
  width: 6px;
}

.about-text::-webkit-scrollbar-thumb {
  background: #5DA9FF;
  border-radius: 10px;
}

/* ======================
TABLETS (1024px and below)
====================== */

@media (max-width:1024px){

  .about-card{
    width: 90%;
    height: auto;
    flex-direction: column;
    padding: 30px;
  }

  .about-video video{
    width: 80%;
    height: auto;
  }

  .about-text{
    margin-left: 0;
    text-align: center;
  }

  .about-text h2{
    font-size: 36px;
  }

  .contact-item{
    font-size: 26px;
    justify-content: center;
  }

  .contact-item svg{
    width: 28px;
    height: 28px;
  }

}

/* ======================
PHONES (768px and below)
====================== */

@media (max-width:768px){

  .navbar{
    flex-direction: column;
    gap: 10px;
  }

  .nav-links1{
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
  }

  .nav-links1 a{
    margin: 5px;
    font-size: 12px;
  }

  .about-wrapper{
    padding-top: 120px;
    height: auto;
  }

  .about-card{
    width: 92%;
    padding: 20px;
  }

  .about-video video{
    width: 100%;
  }

  .about-text h2{
    font-size: 30px;
  }

  .contact-item{
    font-size: 20px;
  }

}

/* ======================
SMALL PHONES (480px)
====================== */

@media (max-width:480px){

  .about-text h2{
    font-size: 26px;
  }

  .contact-item{
    font-size: 18px;
    gap: 10px;
  }

  .contact-item svg{
    width: 22px;
    height: 22px;
  }

}
</style>
