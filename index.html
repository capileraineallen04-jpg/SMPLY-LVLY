<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width-device-width, initial-scale=1.0">
        <title>Login | SMPLY LVLY</title>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap');
:root {
  --accent-color: #0A2A88;
  --base-color: #5DA9FF;
  --text-color: #1A1A1A;
  --input-color: #ffff;
}  
*{
    margin: 0;
    padding: 0;
}
html{
    font-family: Poppins, Segoe UI, sans-serif;
    font-size: 12pt;
    color: var(--text-color);
    text-align: center;
}
body{
    min-height: 100vh;
    background-image: url(bglogin.jpg);
    background-size: cover;
    background-position: right;
    overflow: hidden;

}


.wrapper{
    box-sizing: border-box;
    background-color: var(--base-color);
    height: 100vh;
    width: max(40%, 600px);
    padding: 10px;
    border-radius: 0 20px 20px 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}
h1{
    font-size: 50px;
    font-weight: 900;
    text-transform: uppercase;
}
form{
    width: min(400px, 100%);
    margin-top: 20px;
    margin-bottom: 50px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
}
form > div{
    width: 100%;
    display: flex;
    justify-content: center;
}
form label{
    flex-shrink: 0;
    height: 50px;
    width: 50px;
    background-color: var(--accent-color);
    fill: var(--base-color);
    color: var(--base-color);
    border-radius: 10px 0 0 10px;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 1.5rem;
    font-weight: 500;
}
form input{
    box-sizing: border-box;
    flex-grow: 1;
    min-width: 0;
    height: 50px;
    padding: 1em;
    font: inherit;
    border-radius: 0 10px 10px 0;
    border: 2px solid var(--input-color);
    border-left: none;
    background-color: var(--input-color);
    transition: 150ms ease;
}
form input:hover{
    border-color: var(--accent-color);
}
form input:focus{
    outline: none;
    border-color: var(--text-color);
}
div:has(input:focus) > label{
    background-color: var(--text-color);
}
form input::placeholder{
    color: var(--text-color);
    opacity: 1;
}
form button{
    margin-top: 10px;
    border: none;
    border-radius: 1000px;
    padding: .85em 4em;
    background-color: var(--accent-color);
    color: var(--base-color);
    font: inherit;
    font-weight: 600;
    text-transform: uppercase;
    cursor: pointer;
    transition: 150ms ease;
}
form button:hover{
    background-color: var(--text-color);
}
form button:focus{
    outline: none;
    background-color: var(--text-color);
}
a{
    text-decoration: none;
    color: var(--accent-color);
}
a:hover{
text-decoration: underline;
}
@media(max-width: 1100px){
    .wrapper{
        width: min(600px, 100%);
        border-radius: 0;
    }
}
form div.incorrect label{
    background-color: #f06272;
}
form div.incorrect input{
    border-color: #f06272;
}
#error-message{
    color: #f06272;
}


        </style>
    </head>
    <body>
        <div class="wrapper">
            <h1>SMPLY LVLY</h1>
            <p id="error-message"></p>
            <form id="form">
                <div>
                    <label for="username-input">
                        <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#FFFFFF"><path d="M367-527q-47-47-47-113t47-113q47-47 113-47t113 47q47 47 47 113t-47 113q-47 47-113 47t-113-47ZM160-160v-112q0-34 17.5-62.5T224-378q62-31 126-46.5T480-440q66 0 130 15.5T736-378q29 15 46.5 43.5T800-272v112H160Z"/></svg>
                    </label>
                    <input type="text" name="Username" id="username-input" placeholder="Username">
                </div>
                <div>
                    <label for="password-input">
                        <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#FFFFFF"><path d="M240-80q-33 0-56.5-23.5T160-160v-400q0-33 23.5-56.5T240-640h40v-80q0-83 58.5-141.5T480-920q83 0 141.5 58.5T680-720v80h40q33 0 56.5 23.5T800-560v400q0 33-23.5 56.5T720-80H240Zm296.5-223.5Q560-327 560-360t-23.5-56.5Q513-440 480-440t-56.5 23.5Q400-393 400-360t23.5 56.5Q447-280 480-280t56.5-23.5ZM360-640h240v-80q0-50-35-85t-85-35q-50 0-85 35t-35 85v80Z"/></svg>
                    </label>
                    <input type="password" name="password" id="password-input" placeholder="Password">
                </div>
                <button type="submit">Login</button>
            </form>
        </div>
 <script>
const form = document.getElementById('form')
const username_input = document.getElementById('username-input')
const password_input = document.getElementById('password-input')
const error_message = document.getElementById('error-message')

// ✅ Hardcoded login credentials
const validUsername = "Raineallen03"
const validPassword = "Maxverstappen33"

form.addEventListener('submit', (e) => {
    e.preventDefault()
    error_message.innerText = ""

    let errors = getLoginFormErrors(
        username_input.value.trim(),
        password_input.value.trim()
    )

    // ✅ If no validation errors → check login
    if(errors.length === 0){
        if(
            username_input.value === validUsername &&
            password_input.value === validPassword
        ){
            window.location.href = "homepage.html"
            return
        } else {
            errors.push("Invalid username or password")
        }
    }

    error_message.innerText = errors.join(". ")
})

function getLoginFormErrors(username, password){
    let errors = []

    if(!username){
        errors.push('Username is required')
        username_input.parentElement.classList.add('incorrect')
    }

    if(!password){
        errors.push('Password is required')
        password_input.parentElement.classList.add('incorrect')
    }

    return errors
}

// ✅ Remove red error style while typing
[username_input, password_input].forEach(input => {
    input.addEventListener('input', () => {
        input.parentElement.classList.remove('incorrect')
        error_message.innerText = ''
    })
})
</script>

    </body>
</html>
